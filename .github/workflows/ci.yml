name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Provide dummy values for build
          NEXTAUTH_URL: http://localhost:3000
          AUTH_SECRET: test-secret-for-build
          DATABASE_URL: postgresql://user:pass@localhost/test
          NEXT_PUBLIC_APP_URL: http://localhost:3000

  security-check:
    name: Security Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug
        continue-on-error: true

  pr-quality:
    name: PR Quality Gates
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          git diff --stat origin/${{ github.base_ref }}...HEAD
          LINES=$(git diff --numstat origin/${{ github.base_ref }}...HEAD | awk '{added+=$1; removed+=$2} END {print added+removed}')
          echo "Total lines changed: $LINES"
          if [ "$LINES" -gt 500 ]; then
            echo "❌ PR exceeds 500 lines modified (current: $LINES)"
            exit 1
          fi
          echo "✅ PR size is within limits ($LINES lines)"

  tests:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vd_practica_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/vd_practica_test
        continue-on-error: true

  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, build, security-check, pr-quality, tests]
    if: always()

    steps:
      - name: Print Summary
        run: |
          echo "✅ CI Pipeline Complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Lint & Type Check: ${{ needs.lint-and-type-check.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo "Security Check: ${{ needs.security-check.result }}"
          echo "PR Quality: ${{ needs.pr-quality.result }}"
          echo "Tests: ${{ needs.tests.result }}"
